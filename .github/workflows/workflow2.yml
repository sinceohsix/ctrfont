name: ctrfont2

on:
  workflow_dispatch:
    inputs:
      font_url:
        description: 'URL to a TTF/OTF font file'
        required: true
      font_size:
        description: 'Font size in points'
        required: true
        default: '20'
      font_name:
        description: 'Output name (e.g. PopHappiness)'
        required: true

defaults:
  run:
    shell: msys2 {0}

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true

      - name: Add devkitPro pacman repository
        run: |
          curl -LO https://downloads.devkitpro.org/devkitpro-keyring.pkg.tar.xz
          pacman -U --noconfirm --nodeps --needed devkitpro-keyring.pkg.tar.xz || true
          cat >> /etc/pacman.conf << 'EOF'

          [dkp-libs]
          SigLevel = Optional TrustAll
          Server = https://downloads.devkitpro.org/packages

          [dkp-windows]
          SigLevel = Optional TrustAll
          Server = https://downloads.devkitpro.org/packages/windows
          EOF
          pacman -Sy --noconfirm

      - name: Install 3ds-dev and Python
        run: pacman -S --noconfirm 3ds-dev python

      - name: Download custom font
        run: curl -L "${{ github.event.inputs.font_url }}" -o mergefonts/custom_font.ttf

      - name: Merge fonts
        run: |
          fontforge/bin/fontforge.exe mergefonts/merge-fonts.py \
            mergefonts/custom_font.ttf \
            mergefonts/nintendo_NTLG-DB_001.ttf \
            mergefonts/merged_font.ttf

      - name: Convert TTF to BCFNT
        run: |
          source /etc/profile.d/devkit-env.sh
          mkbcfnt -o fonttool/SystemFont.bcfnt \
            -s ${{ github.event.inputs.font_size }} \
            mergefonts/merged_font.ttf

      - name: Run FontTool
        shell: pwsh
        run: |
          cd fonttool
          python3 FontTool.py -font SystemFont.bcfnt
          exit 0

      - name: Upload CIA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.font_name }}Font
          path: fonttool/SystemFont.cia
